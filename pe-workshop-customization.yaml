## --- ORCHESTRATOR FEATURE ---
# orchestrator:
#   enabled: true
## --- ORCHESTRATOR FEATURE ---
global:
  clusterRouterBase: apps.cluster-knrcm.dynamic.redhatworkshops.io
  host: backstage-backstage.apps.cluster-knrcm.dynamic.redhatworkshops.io
  dynamic:
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: ./dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-gitlab-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-argocd-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-topology
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-tekton
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-redhat-argocd
        disabled: false

      # --- TECHDOCS_PLUGIN ---
      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-catalog-backend-module-gitlab-dynamic
        disabled: false
      # --- TECHDOCS_PLUGIN ---

      ## --- DYNAMIC_PLUGINS_IMPORT_COMPONENTS ---
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-utils-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/immobiliarelabs-backstage-plugin-gitlab-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/immobiliarelabs-backstage-plugin-gitlab
        disabled: false
      ## --- DYNAMIC_PLUGINS_IMPORT_COMPONENTS ---

      ## --- RBAC ---
      - package: ./dynamic-plugins/dist/backstage-community-plugin-rbac
        disabled: false
      ## --- RBAC ---

      ## --- ORCHESTRATOR ADDITIONAL PLUGINS ---
      - disabled: false
        package: "./dynamic-plugins/dist/backstage-plugin-notifications"
      - disabled: false
        package: "./dynamic-plugins/dist/backstage-plugin-signals"
      - disabled: false
        package: "./dynamic-plugins/dist/backstage-plugin-notifications-backend-dynamic"
      - disabled: false
        package: "./dynamic-plugins/dist/backstage-plugin-signals-backend-dynamic"
      ## --- ORCHESTRATOR PLUGIN ---

upstream:
  postgresql:
    # Seems this is now required, at least with OCP 4.20 on CNV
    # primary:
    #   podSecurityContext:
    #     enabled: true
    #     # Remove fsGroup or set to null so OpenShift assigns one
    #     fsGroup: null
    # We manually supply the postgres secret and create the
    # backstage-postgresql-svcbind-postgres instead of using
    # serviceBindings.enabled: true, this is because of a bug
    # where the chart relies on "lookup" but ArgoCD doesn't 
    # exuecte the lookup for performance and security reasons.
    # Failure to do this results in the orchestrator not using
    # the correct password since the generated svcbind would 
    # always use a random value
    serviceBindings:
      enabled: false
    auth:
      username: postgres
      database: backstage
      existingSecret: backstage-postgresql-svcbind-postgres
      secretKeys:
        userPasswordKey: password
        adminPasswordKey: password

  backstage:
    extraEnvVarsSecrets:
      - gitlab-token
      - argocd-password
      - kubernetes-sa-token
      - oauth-client
      - backstage-orchestrator-token
    appConfig:
      # --- APP TITLE ---
      app:
        title: PE Developer Hub
      # --- APP TITLE ---
      
      # --- ADOPTION INSIGHTS ---
        analytics:
          adoptionInsights:
            licensedUsers: 35 
      # --- ADOPTION INSIGHTS ---

      ## --- AUTHENTICATION ---
      
      ## Configuration required to enable OpenID Connect authentication
      auth:
        session:
          secret: ${BACKEND_SECRET}
        environment: production
        providers:
          oidc:
            production:
              prompt: auto
              metadataUrl: https://sso.apps.cluster-knrcm.dynamic.redhatworkshops.io/realms/backstage/.well-known/openid-configuration
              clientId: ${OAUTH_CLIENT_ID}
              clientSecret: ${OAUTH_CLIENT_SECRET}
              signIn:
                resolvers:
                  - resolver: preferredUsernameMatchingUserEntityName
      signInPage: oidc
      ## --- AUTHENTICATION --- #

      backend:
        ## --- ORCHESTRATOR ---
        auth:
          externalAccess:
            - type: static
              options:
                token: ${ORCHESTRATOR_TOKEN}
                subject: orchestrator
        csp:
          script-src: ["'self'", "'unsafe-inline'", "'unsafe-eval'"]
          script-src-elem: ["'self'", "'unsafe-inline'", "'unsafe-eval'"]
          connect-src: ["'self'", 'http:', 'https:', 'data:']
        cors:
          origin: https://backstage-backstage.apps.cluster-knrcm.dynamic.redhatworkshops.io
        database:
          client: pg
          connection:
            host: "${POSTGRES_HOST}"
            port: "${POSTGRES_PORT}"
            user: "${POSTGRES_USER}"
            password: "${POSTGRES_PASSWORD}"
        ## --- ORCHESTRATOR ---
        listen:
          port: 7007
          host: 0.0.0.0

      integrations:
        gitlab:
          - apiBaseUrl: https://gitlab-gitlab.apps.cluster-knrcm.dynamic.redhatworkshops.io/api/v4
            baseUrl: https://gitlab-gitlab.apps.cluster-knrcm.dynamic.redhatworkshops.io
            host: gitlab-gitlab.apps.cluster-knrcm.dynamic.redhatworkshops.io
            token: ${GITLAB_TOKEN}
      catalog:
        rules:
            - allow: [Component, System, API, Resource, Location, Template, Domain, Group, User]
        locations: []
        providers:

          ## --- GITLAB_CATALOG_PROVIDER ---
          gitlab:
            default:
              host: gitlab-gitlab.apps.cluster-knrcm.dynamic.redhatworkshops.io
              branch: main
              fallbackBranch: master
              skipForkedRepos: true
              entityFilename: catalog-info.yaml
              projectPattern: \w*techdocs\w*
              schedule:
                frequency: { minutes: 2 }
                timeout: { minutes: 3 }
                initialDelay: { seconds: 15 }
          # --- GITLAB_CATALOG_PROVIDER ---

          # --- AUTO_DISCOVERY_IMPORT_COMPONENTS ---
            all-location-entity:
              host: gitlab-gitlab.apps.cluster-knrcm.dynamic.redhatworkshops.io
              filters:
                branch: main
              skipForkedRepos: true
              entityFilename: all-location.yaml
              catalogPath: /**/all-location.yaml
              projectPattern: \b(all-location\w*)
              excludeRepos: []
              schedule:
                frequency:
                  seconds: 15
                initialDelay:
                  seconds: 15
                timeout:
                  minutes: 3
          # --- AUTO_DISCOVERY_IMPORT_COMPONENTS ---

          # --- KEYCLOAK_CATALOG_PROVIDERS ---
          keycloakOrg:
            default:
              baseUrl: https://sso.apps.cluster-knrcm.dynamic.redhatworkshops.io
              realm: backstage
              loginRealm: backstage
              clientId: backstage-plugin
              clientSecret: Pn0QpFHb9AgjWbtHw4Fm6tvN5aRQChQY
              schedule:
                frequency: { minutes: 2 }
                timeout: { minutes: 1 }
                initialDelay: { seconds: 15 }
          # --- KEYCLOAK_CATALOG_PROVIDERS ---

      ## --- TECHDOCS_CONFIG ---
      techdocs:
        builder: 'local'
        publisher:
          type: 'local'
        generator:
          runIn: local
      ## --- TECHDOCS_CONFIG ---
      argocd:
        appLocatorMethods:
          - type: 'config'
            instances:
              - name: main
                url: https://rhdh-gitops-server-rhdh-gitops.apps.cluster-knrcm.dynamic.redhatworkshops.io
                username: admin
                password: ${ARGOCD_PASSWORD}
      kubernetes:
        serviceLocatorMethod:
          type: multiTenant
        clusterLocatorMethods:
          - clusters:
              - name: dev-cluster
                url: https://api.cluster-knrcm.dynamic.redhatworkshops.io:6443
                authProvider: serviceAccount
                skipTLSVerify: true
                serviceAccountToken: ${KUBERNETES_SA_TOKEN}
            type: config
        customResources:
          - group: 'tekton.dev'
            apiVersion: 'v1beta1'
            plural: 'pipelineruns'
          - group: 'tekton.dev'
            apiVersion: 'v1beta1'
            plural: 'taskruns'
      ## --- RBAC --- #
      permission:
        enabled: true
        rbac:
          admin:
            users:
              - name: user:default/pe1
              - name: user:default/pe2
          policies-csv-file: ./rbac/rbac-policy.csv
          conditionalPoliciesFile: ./rbac/rbac-conditional-policies.yaml
      ## --- RBAC --- #

    extraEnvVars:
      - name: NODE_OPTIONS
        value: --no-node-snapshot
      - name: BACKEND_SECRET
        value: YkRwbmZvZ01oelEzbURjRWZaZHJFRFRD
      - name: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
    extraVolumeMounts:
      - name: dynamic-plugins-root
        mountPath: /opt/app-root/src/dynamic-plugins-root
      - name: rbac-policy
        mountPath: opt/app-root/src/rbac
      - name: temp
        mountPath: /tmp
    extraVolumes:
      - name: dynamic-plugins-root
        persistentVolumeClaim:
          claimName: dynamic-plugins-root
      - name: dynamic-plugins
        configMap:
          defaultMode: 420
          name: '{{ printf "%s-dynamic-plugins" .Release.Name }}'
          optional: true
      - name: dynamic-plugins-npmrc
        secret:
          defaultMode: 420
          optional: true
          secretName: '{{ printf "%s-dynamic-plugins-npmrc" .Release.Name }}'
      - name: dynamic-plugins-registry-auth
        secret:
          defaultMode: 416
          optional: true
          secretName: '{{ printf "%s-dynamic-plugins-registry-auth" .Release.Name }}'
      - name: npmcacache
        emptyDir: {}
      - name: temp
        emptyDir: {}
      - name: rbac-policy
        configMap:
          name: rbac-policy
          defaultMode: 420

    initContainers:
      - name: install-dynamic-plugins
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 2.5Gi
            ephemeral-storage: 5Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          seccompProfile:
            type: "RuntimeDefault"
        image: '{{ include "backstage.image" . }}'
        command:
          - ./install-dynamic-plugins.sh
          - /dynamic-plugins-root
        env:
          - name: NPM_CONFIG_USERCONFIG
            value: /opt/app-root/src/.npmrc.dynamic-plugins
          - name: MAX_ENTRY_SIZE
            value: "30000000"
        imagePullPolicy: Always
        volumeMounts:
          - mountPath: /dynamic-plugins-root
            name: dynamic-plugins-root
          - mountPath: /opt/app-root/src/dynamic-plugins.yaml
            name: dynamic-plugins
            readOnly: true
            subPath: dynamic-plugins.yaml
          - mountPath: /opt/app-root/src/.npmrc.dynamic-plugins
            name: dynamic-plugins-npmrc
            readOnly: true
            subPath: .npmrc
          - mountPath: /opt/app-root/src/.config/containers
            name: dynamic-plugins-registry-auth
            readOnly: true
          - mountPath: /opt/app-root/src/.npm/_cacache
            name: npmcacache
        workingDir: /opt/app-root/src

  service:
    ports:
      backend: 7007
      targetPort: backend

  # --- MONITORING ---
  metrics:
    serviceMonitor:
      enabled: true
      path: /metrics
  # --- MONITORING ---

route:
  host: backstage-backstage.apps.cluster-knrcm.dynamic.redhatworkshops.io
